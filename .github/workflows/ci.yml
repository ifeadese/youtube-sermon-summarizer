name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least privilege: this workflow only reads the code and runs tests.
permissions:
  contents: read

# Don't pile up redundant runs — a new push to the same branch/PR cancels the
# in-progress run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lockfile install + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Single source of truth for the Python version.
          python-version-file: backend/.python-version
          # Cache pip downloads, keyed on the lock + dev requirement files.
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.txt

      - name: Install from the lockfile (reproducible) + dev deps
        run: pip install -r requirements.lock -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
